name: Build APK

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y python3-pip zip unzip openjdk-17-jdk
        pip install buildozer cython

    - name: Build APK
      run: |
        buildozer init
        sed -i 's/title = .*/title = Produit App/' buildozer.spec
        sed -i 's/package.name = .*/package.name = produitapp/' buildozer.spec
        sed -i 's/requirements = .*/requirements = python3,kivy/' buildozer.spec
        buildozer -v android debug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: apk
        path: bin/*.apk
